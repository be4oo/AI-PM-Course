description: AI PM Course baseline evaluation suite

providers:
  - id: google:gemini-2.5-pro
    config:
      temperature: 0

prompts:
  - file://prompts/user.txt

tests:
  - vars:
      user_goal: "Write a rollout plan for an AI support assistant with human fallback."
      expected_keywords: "guardrail,rollback,monitoring"
    assert:
      - type: contains-any
        value:
          - "guardrail"
          - "rollback"
          - "monitoring"
      - type: javascript
        value: "output.length > 250"
