name: Freshness Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  baseline-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run check:freshness
