name: Freshness Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  baseline-freshness:
    runs-on: ubuntu-latest
    env:
      FRESHNESS_MAX_MISSING_LAST_VERIFIED: "49"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run check:freshness
      - run: npm run freshness:sweep
      - run: npm run rss:generate
      - uses: actions/upload-artifact@v4
        with:
          name: freshness-artifacts
          path: |
            docs/freshness-report.md
            public/rss.xml
