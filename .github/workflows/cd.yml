name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual triggering

concurrency:
  group: cd-production
  cancel-in-progress: false   # Never cancel an in-progress deploy

jobs:
  build-and-push:
    name: Build & Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval in GitHub Environments settings
    steps:
      - uses: actions/checkout@v4

      # CUSTOMIZE: Replace with your deployment mechanism
      # Examples: kubectl, fly deploy, railway up, vercel deploy, etc.
      - name: Deploy
        run: |
          echo "CUSTOMIZE: Replace this step with your deployment command"
          echo "Deploying image: ${{ needs.build-and-push.outputs.image-tag }}"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Health check
        # CUSTOMIZE: Replace with your health check endpoint
        run: |
          sleep 10
          curl --fail --silent --max-time 30 "${{ secrets.APP_URL }}/health" \
            || (echo "Health check failed — deployment may need rollback" && exit 1)
